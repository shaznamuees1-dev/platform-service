apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-service
  template:
    metadata:
      labels:
        app: platform-service
    spec:
      containers:
        - name: platform-service
          image: platform-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
